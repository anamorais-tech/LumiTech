<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LumiTech</title>
  <link rel="stylesheet" href="login.css">
  <link rel="icon" type="image/png" href="../img/logo.png">
</head>

<body>

  <div class="container">
    <div class="logo">
      <img src="../img/logo.png" alt="Logo LumiTech">
    </div>

    <div class="login">

      <h1>LOGIN</h1>

      <form id="form_login">
        <div class="input_caixa">

          <div class="input_icone">
            <img src="../img/email.png" alt="Ícone de e-mail">
          </div>

          <input type="text" name="login" id="login" placeholder="E-mail:" required>

        </div>

        <div class="input_caixa">

          <div class="input_icone">
            <img src="../img/senha.png" alt="Ícone de senha">
          </div>

          <input type="password" name="senha" id="senha" placeholder="Senha:" required>

        </div>

        <div class="botoes_div">

          <button type="submit" class="btn_entrar">
            Entrar
          </button>

          <a href="../index.html" class="voltar">
            Voltar
          </a>

        </div>

        <p class="cadastro">
          Não tem conta?
          <a href="../cadastro/cadastro.html">
            Criar conta
          </a>
        </p>

      </form>

    </div>

  </div>

<script src="login.js"></script>

</body>

</html>
