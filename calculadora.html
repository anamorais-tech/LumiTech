<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculadora de Consumo | LumiTech</title>

  <link rel="stylesheet" href="calculadora.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>

<body>

  <div class="container">

    <h1>Calculadora de consumo</h1>

    <div class="linha"></div>

    <!-- APARELHO  -->
    <div class="campo aparelho-box">

      <label for="aparelho">
        Aparelho
      </label>

      <select id="aparelho">
        <option value="">Selecione</option>

        <option value="150">Geladeira</option>
        <option value="5500">Chuveiro Elétrico</option>
        <option value="350">Micro-ondas</option>
        <option value="1000">Ar-condicionado</option>
        <option value="90">Televisão</option>
        <option value="10">Lâmpada LED</option>
        <option value="1500">Ferro de Passar</option>
        <option value="2000">Máquina de Lavar</option>
        <option value="100">Ventilador</option>
        <option value="1200">Secador de Cabelo</option>
        <option value="1000">Forno Elétrico</option>
      </select>
    </div>

    <!-- LINHA 2 -->
    <div class="linha-inputs">

      <!-- POTÊNCIA -->
      <div class="campo pequeno">
        <label for="potencia">
          Potência (W)
        </label>

        <input 
          type="number"
          id="potencia"
          readonly
        >
      </div>

      <!-- HORAS -->
      <div class="campo pequeno">
        <label for="horas">
          Horas/dia
        </label>

        <input 
          type="number"
          id="horas"
          min="1"
        >
      </div>

    </div>

    <!-- DIAS -->
    <div class="campo pequeno">
      <label for="dias">
        Dias por mês
      </label>

      <input 
        type="number"
        id="dias"
        min="1"
        max="31"
      >
    </div>

    <!-- RESULTADO -->
    <div class="resultado-box">

      <button onclick="calcular()">
        Calcular
      </button>

      <div class="resultado">

        <div class="icone">
          <img src="img/raio.png" alt="">
        </div>

        <div class="resultado-texto">

          <h2>Consumo</h2>

          <p>
            <span id="resultadoKwh">0</span>
            kWh /Mês
          </p>

          <small id="resultadoValor">
            R$ 0,00 por mês
          </small>

        </div>

      </div>

    </div>

  </div>

  <script src="calculadora.js"></script>

</body>
</html>
