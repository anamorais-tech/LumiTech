<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Consumo | LumiTech</title>
  <link rel="stylesheet" href="calculadora.css">
  <link rel="icon" type="image/png" href="../img/logo.png">
</head>

<body>

  <div class="container">

    <h1>Calculadora de consumo</h1>

    <div class="linha"></div>

    <!--Aparelho-->
    <div class="aparelho">
      <label for="aparelho">
        Aparelho
      </label>

      <select id="aparelho">
        <option value="">Selecione</option>

        <option value="150">Geladeira</option>
        <option value="250">Geladeira Frost-free</option>
        <option value="120">Freezer</option>
        <option value="4500">Chuveiro Elétrico</option>
        <option value="1000">Micro-ondas</option>
        <option value="900">Ar-condicionado (janela ~7.500 BTU)</option>
        <option value="60">Televisão LED 32" </option>
        <option value="60">Lâmpada Incandescente</option>
        <option value="15">Lâmpada Fluorescente (CFL)</option>
        <option value="10">Lâmpada LED</option>
        <option value="1200">Ferro de Passar</option>
        <option value="500">Lavadora de Roupas</option>
        <option value="50">Ventilador de Mesa/Pedestal</option>
        <option value="1500">Secador de Cabelo</option>
        <option value="1000">Forno Elétrico</option>
        <option value="10">Roteador Wi-Fi</option>
        <option value="300">Computador Desktop </option>
        <option value="50">Notebook</option>
        <option value="2000">Aquecedor (ambiente)</option>
        <option value="800">Cafeteira Elétrica</option>
        <option value="1200">Lava-Louças</option>
      </select>
    </div>

    <!--Parte dos inputs-->
    <div class="linha_inputs">
      <!--potencia-->
      <div class="potencia">
        <label for="potencia">
          Potência (W)
        </label>
        <input type="number" id="potencia" readonly>
      </div>

      <!--Horas-->
      <div class="horas">
        <label for="horas">
          Horas/dia
        </label>
        <input type="number" id="horas" min="1">
      </div>
    </div>

    <!--Dias-->
    <div class="dias">
      <label for="dias">
        Dias por mês
      </label>
      <input type="number" id="dias" min="1" max="31">
    </div>

    <!--Resultado-->
    <div class="resultado_box">
      <div class="resultado">
        <div class="icone">
          <img src="../img/raio.png" alt="">
        </div>

        <div class="resultado-texto">
          <h2>Consumo</h2>
          <p>
            <span id="resultadoKwh">0</span>
            kWh /Mês
          </p>

          <p>
            <span id="resultadoValor">
              R$ 0,00 por mês
            </span>
          </p>

        </div>
      </div>

      <button onclick="calcular()">
        Calcular
      </button>
      
      <button onclick="voltarPagina()">
        Voltar
      </button>

    </div>
  </div>

  <script src="calculadora.js"></script>

</body>

</html>
