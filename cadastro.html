<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | LumiTech</title>

  <link rel="stylesheet" href="cadastro.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>

<body>

  <div class="container">

    <div class="logo">
      <img src="img/logo.png" alt="Logo LumiTech">
    </div>

    <div class="cad">

      <h1>Cadastro</h1>

      <form>

        <div class="input_caixa">
          <div class="input_icone">
            <img src="img/usuario.png" alt="">
          </div>

          <input type="text"
                 id="nome"
                 name="nome"
                 placeholder="Nome:"
                 required>
        </div>

        <div class="input_caixa">
          <div class="input_icone">
            <img src="img/email.png" alt="">
          </div>

          <input type="email"
                 id="email"
                 name="email"
                 placeholder="E-mail:"
                 required>
        </div>

        <div class="input_caixa">
          <div class="input_icone">
            <img src="img/email.png" alt="">
          </div>

          <input type="email"
                 placeholder="Confirmar e-mail:"
                 required>
        </div>

        <div class="input_caixa">
          <div class="input_icone">
            <img src="img/senha.png" alt="">
          </div>

          <input type="password"
                 id="senha"
                 name="senha"
                 placeholder="Senha:"
                 required>
        </div>

        <div class="input_caixa">
          <div class="input_icone">
            <img src="img/senha.png" alt="">
          </div>

          <input type="password"
                 placeholder="Confirmar senha:"
                 required>
        </div>

        <div class="botoes_div">
          <button type="submit" class="btn_cad">
            Cadastrar
          </button>

          <a href="index.html"
             class="voltar">
             Voltar
          </a>
        </div>

      </form>

    </div>

  </div>

</body>
</html>
